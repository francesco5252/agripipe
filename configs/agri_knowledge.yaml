# 🇮🇹 AgriPipe: Atlante Agronomico Territoriale Italiano
# Regole iper-localizzate basate su Coltura + Zona.

regional_presets:
  # --- OLIVO ---
  ulivo_ligure:
    region: "Liguria"
    crop: "olive"
    crop_display: "Olivo DOP Taggiasca"
    zona: "Liguria (Riviera)"
    suolo_tessitura: "Medio impasto / Scheletro"
    max_yield: 5.0            # Rese basse, alta qualità (olio DOP)
    temp_range: [-5, 38]
    ideal_ph: [6.5, 7.5]
    note: "Focus su terreni terrazzati e bassa meccanizzazione."

  ulivo_pugliese:
    region: "Puglia"
    crop: "olive"
    crop_display: "Olivo Intensivo (Salento)"
    zona: "Puglia (Salento/Bari)"
    suolo_tessitura: "Terra rossa / Calcareo"
    max_yield: 12.0           # Rese alte, impianti intensivi
    temp_range: [-2, 45]
    ideal_ph: [7.0, 8.5]
    salinity_tolerance: 4.0
    note: "Pianure assolate, alta tolleranza al calore."

  # --- GRANO ---
  grano_siciliano:
    region: "Sicilia"
    crop: "durum_wheat"
    crop_display: "Grano Duro Antico Siciliano"
    zona: "Sicilia (Entroterra)"
    suolo_tessitura: "Argilloso (Vertisuoli)"
    max_yield: 4.5
    temp_range: [-5, 45]
    harvest_months: [5, 6]    # Mietitura precoce
    ideal_ph: [7.5, 8.5]
    note: "Grano duro antico, suoli pesanti e fessurati in estate."

  grano_emiliano:
    region: "Emilia-Romagna"
    crop: "soft_wheat"
    crop_display: "Grano Tenero Emiliano"
    zona: "Emilia-Romagna (Pianura Padana)"
    suolo_tessitura: "Limoso / Alluvionale"
    max_yield: 10.0
    temp_range: [-15, 35]
    harvest_months: [6, 7]
    ideal_ph: [6.0, 7.5]
    note: "Grano tenero per panificazione, suoli fertili e freschi."

  # --- VITE ---
  vite_piemontese:
    region: "Piemonte"
    crop: "wine_grape_docg"
    crop_display: "Vite Nebbiolo (Barolo DOCG)"
    zona: "Langhe / Roero"
    suolo_tessitura: "Marne / Argille calcaree"
    max_yield: 8.0
    temp_range: [-15, 36]
    harvest_months: [9, 10]
    ideal_ph: [7.0, 8.0]
    note: "Grandi vini rossi (DOCG), focus su microclimi di collina."

  # --- LOMBARDIA ---
  riso_lombardo:
    region: "Lombardia"
    crop: "rice"
    crop_display: "Riso Carnaroli"
    zona: "Lomellina (Pavia)"
    suolo_tessitura: "Sommerso / Franco-limoso"
    max_yield: 7.0
    temp_range: [-8, 35]
    harvest_months: [9, 10]
    ideal_ph: [5.5, 7.0]
    note: "Risaie allagate, richiede gestione idrica precisa."

  # --- VENETO ---
  prosecco_veneto:
    region: "Veneto"
    crop: "wine_grape_docg"
    crop_display: "Vite Prosecco DOCG"
    zona: "Valdobbiadene / Conegliano"
    suolo_tessitura: "Vulcanico / Marnoso-arenaceo"
    max_yield: 13.5
    temp_range: [-10, 35]
    harvest_months: [8, 9]
    ideal_ph: [6.5, 7.5]
    note: "Colline UNESCO, microclimi ventilati."

  # --- TRENTINO-ALTO ADIGE ---
  mela_trentina:
    region: "Trentino-Alto Adige"
    crop: "apple"
    crop_display: "Mela Melinda DOP"
    zona: "Val di Non"
    suolo_tessitura: "Morenico / Ghiaioso"
    max_yield: 60.0
    temp_range: [-20, 32]
    harvest_months: [9, 10]
    ideal_ph: [6.0, 7.0]
    note: "Richiede fabbisogno freddo invernale (>1200 ore)."

  # --- EMILIA-ROMAGNA (secondo preset) ---
  pomodoro_emiliano:
    region: "Emilia-Romagna"
    crop: "tomato"
    crop_display: "Pomodoro da Industria"
    zona: "Parma / Piacenza"
    suolo_tessitura: "Alluvionale / Limoso"
    max_yield: 90.0
    temp_range: [-5, 38]
    harvest_months: [7, 8, 9]
    ideal_ph: [6.0, 7.0]
    note: "Pianura Padana irrigua, filiera industriale."

  # --- TOSCANA ---
  vite_toscana:
    region: "Toscana"
    crop: "wine_grape_docg"
    crop_display: "Vite Chianti DOCG (Sangiovese)"
    zona: "Chianti Classico"
    suolo_tessitura: "Galestro / Alberese"
    max_yield: 9.0
    temp_range: [-10, 38]
    harvest_months: [9, 10]
    ideal_ph: [6.5, 7.5]
    note: "Colline toscane, varietà Sangiovese."

  ulivo_toscano:
    region: "Toscana"
    crop: "olive"
    crop_display: "Olivo DOP Toscano"
    zona: "Colline Pisane/Senesi"
    suolo_tessitura: "Argilloso calcareo"
    max_yield: 4.5
    temp_range: [-8, 38]
    ideal_ph: [6.5, 7.5]
    note: "Olio IGP, cultivar Frantoio/Leccino/Moraiolo."

  # --- SICILIA ---
  pomodoro_siciliano:
    region: "Sicilia"
    crop: "tomato"
    crop_display: "Pomodoro da Mensa Siciliano"
    zona: "Sicilia (Ragusa / Siracusa)"
    suolo_tessitura: "Argilloso / Vulcanico"
    max_yield: 70.0
    temp_range: [10, 42]
    harvest_months: [6, 7, 8, 9]
    ideal_ph: [6.0, 7.5]
    salinity_tolerance: 3.0
    note: >
      Coltivazione in pieno campo e in serra (Ragusa, Siracusa). Alta
      tolleranza al calore estivo; suoli profondi e ben drenati.
      Varietà tipiche: Datterino, Cherry, Costoluto.

  # --- CAMPANIA ---
  pomodoro_sanmarzano:
    region: "Campania"
    crop: "tomato"
    crop_display: "Pomodoro San Marzano DOP"
    zona: "Agro Nocerino-Sarnese"
    suolo_tessitura: "Vulcanico (Vesuviano)"
    max_yield: 50.0
    temp_range: [0, 40]
    harvest_months: [7, 8, 9]
    ideal_ph: [6.0, 7.0]
    note: "Pomodoro lungo DOP, coltivazione tradizionale."

# --- REGOLE BIOLOGICHE PER COLTURA ---
# Consumate da cleaner._apply_agronomic_rules via self.knowledge["crops"].
crops:
  olive:
    t_base: 10.0
    max_yield: 12.0
    flowering_months: [5, 6]
    frost_danger_months: [3, 4]
    critical_temp_flowering: 35

  durum_wheat:
    t_base: 0.0
    max_yield: 6.0
    flowering_months: [4, 5]
    frost_danger_months: [3]
    critical_temp_flowering: 32

  soft_wheat:
    t_base: 0.0
    max_yield: 10.0
    flowering_months: [5]
    frost_danger_months: [3, 4]
    critical_temp_flowering: 30

  wine_grape_docg:
    t_base: 10.0
    max_yield: 14.0
    flowering_months: [5, 6]
    frost_danger_months: [4]
    critical_temp_flowering: 38
    rule_10_temp: 10
    rule_10_rain: 10

  rice:
    t_base: 12.0
    max_yield: 9.0
    flowering_months: [7, 8]
    frost_danger_months: [4, 5]
    critical_temp_flowering: 35

  apple:
    t_base: 4.0
    max_yield: 70.0
    flowering_months: [4, 5]
    frost_danger_months: [4]
    critical_temp_flowering: 35
    chill_hours_required: 1200

  tomato:
    t_base: 10.0
    max_yield: 100.0
    flowering_months: [6, 7]
    frost_danger_months: [4, 5]
    critical_temp_flowering: 38

general:
  min_organic_matter: 1.5

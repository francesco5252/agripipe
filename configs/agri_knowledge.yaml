# 🇮🇹 AgriPipe: Atlante Agronomico Territoriale Italiano
# Regole iper-localizzate basate su Coltura + Zona.

regional_presets:
  # --- LIGURIA: AGRICOLTURA EROICA TRA MARE E MONTI ---

  basilico_genovese_dop:
    region: "Liguria"
    crop: "basil"
    crop_display: "Basilico Genovese DOP (Prà/Ponente)"
    zona: "Genova Prà / Riviera di Ponente"
    suolo_tessitura: "Medio impasto (Ricco di sostanza organica)"
    max_yield: 3.0            # t/ha per sfalcio (si raccoglie giovane)
    temp_range: [10, 32]      # Molto sensibile al freddo (<10°C ferma la crescita)
    ideal_ph: [6.0, 7.2]
    harvest_months: [4, 5, 6, 7, 8, 9, 10]
    note: "Coltura simbolo per il pesto; richiede irrigazione frequente e luce."

  ulivo_taggiasco_dop:
    region: "Liguria"
    crop: "olive"
    crop_display: "Olivo DOP Taggiasca (Imperia)"
    zona: "Provincia di Imperia (Terrazzamenti)"
    suolo_tessitura: "Scheletro prevalente (Terreni rocciosi)"
    max_yield: 5.5            # Rese contenute causa pendenza e sesto d'impianto
    temp_range: [-5, 38]
    ideal_ph: [6.5, 7.8]
    harvest_months: [11, 12, 1]
    note: "Raccolta manuale o con agevolatori su reti; terreni drenanti."

  vite_eroica_liguria:
    region: "Liguria"
    crop: "wine_grape_doc"
    crop_display: "Vite di Costa (Pigato/Vermentino)"
    zona: "Riviera di Ponente / Cinque Terre"
    suolo_tessitura: "Sabbioso-ghiaioso (Rocce disgregate)"
    max_yield: 9.0            # Limite per DOC eroiche
    temp_range: [-8, 36]
    ideal_ph: [6.0, 7.5]
    harvest_months: [9]
    salinity_tolerance: 2.5   # Tolleranza all'aerosol marino
    note: "Viticoltura su muretti a secco; esposizione diretta ai venti marini."

  ortaggi_albenga_igp:
    region: "Liguria"
    crop: "vegetables"
    crop_display: "Ortaggi della Piana di Albenga"
    zona: "Piana di Albenga (Savona)"
    suolo_tessitura: "Alluvionale (Franco-limoso)"
    max_yield: 40.0           # Media pesata (Pomodoro/Zucchina)
    temp_range: [5, 35]
    ideal_ph: [6.5, 7.5]
    harvest_months: [3, 4, 5, 6, 7, 8]
    note: "Zona ad altissima fertilità; focus su Cuore di bue e Trombetta."

  # --- FRIULI VENEZIA GIULIA: TRA ALPI E ADRIATICO ---

  vite_collio_ponca:
    region: "Friuli Venezia Giulia"
    crop: "wine_grape_doc"
    crop_display: "Vite del Collio (Ponca)"
    zona: "Gorizia / Collio"
    suolo_tessitura: "Ponca (Marne e Arenarie stratificate)"
    max_yield: 11.0           # t/ha (Vini bianchi di pregio)
    temp_range: [-10, 36]
    ideal_ph: [7.2, 8.2]      # Terreni basici marnosi
    harvest_months: [9]
    note: "Suolo unico (Ponca) con ottima regolazione idrica naturale."

  vite_grave_friuli:
    region: "Friuli Venezia Giulia"
    crop: "wine_grape_doc"
    crop_display: "Vite delle Grave (Sassi)"
    zona: "Pordenone / Udine (Pianura del Tagliamento)"
    suolo_tessitura: "Ghiaioso-ciottoloso (Iper-drenante)"
    max_yield: 13.0
    temp_range: [-12, 38]
    ideal_ph: [7.0, 7.8]
    harvest_months: [9]
    note: "I sassi riflettono la luce e creano forte escursione termica."

  mais_bassa_friulana:
    region: "Friuli Venezia Giulia"
    crop: "maize"
    crop_display: "Mais Bassa Friulana"
    zona: "Bassa Friulana (Udine / Palmanova)"
    suolo_tessitura: "Medio impasto / Alluvionale"
    max_yield: 18.0           # Alta produttività
    temp_range: [5, 40]
    ideal_ph: [6.5, 7.5]
    harvest_months: [9, 10]
    note: "Zona ricca di risorgive; richiede irrigazione di soccorso a Luglio."

  asparago_bianco_friulano:
    region: "Friuli Venezia Giulia"
    crop: "asparagus"
    crop_display: "Asparago Bianco (Tavagnacco/Fossalon)"
    zona: "Tavagnacco / Grado (Fossalon)"
    suolo_tessitura: "Sabbioso-sciolto (Zero resistenza alla crescita)"
    max_yield: 8.0            # t/ha
    temp_range: [5, 28]       # Teme il caldo precoce che rovina i turioni
    ideal_ph: [6.5, 7.5]
    harvest_months: [4, 5]    # Raccolta primaverile
    note: "Fondamentale la tessitura sabbiosa per la linearità del turione."

  # --- VALLE D'AOSTA: AGRICOLTURA ESTREMA ALPINA ---

  vite_blanc_de_morgex:
    region: "Valle d'Aosta"
    crop: "wine_grape_doc"
    crop_display: "Blanc de Morgex et de La Salle"
    zona: "Alta Valle (Morgex/La Salle) - Fino a 1200m slm"
    suolo_tessitura: "Sabbioso-ghiaioso (Granitico)"
    max_yield: 9.0            # Rese contenute causa altitudine
    temp_range: [-22, 32]     # Estrema resistenza al freddo invernale
    ideal_ph: [6.0, 7.2]
    harvest_months: [9, 10]
    note: "Vigneti ai piedi del Monte Bianco; pergole basse anti-gelo."

  mela_reinette_vda:
    region: "Valle d'Aosta"
    crop: "apple"
    crop_display: "Mela Reinette du Canada VdA"
    zona: "Valle Centrale (Saint-Pierre / Villeneuve)"
    suolo_tessitura: "Franco-sabbioso (Alveo glaciale)"
    max_yield: 45.0           # Rese inferiori rispetto alla pianura
    temp_range: [-18, 30]
    ideal_ph: [6.0, 7.0]
    harvest_months: [9, 10]
    note: "Mele rugose d'alta quota; sensibile a siccità estiva alpina."

  patata_vda_montagna:
    region: "Valle d'Aosta"
    crop: "potato"
    crop_display: "Patata di Montagna Valdostana"
    zona: "Valli laterali / Altipiani"
    suolo_tessitura: "Sabbioso-sciolto (Drenaggio perfetto)"
    max_yield: 25.0           # t/ha
    temp_range: [0, 28]       # Teme il calore eccessivo (stress tubero)
    ideal_ph: [5.5, 6.5]      # Predilige terreni sub-acidi
    harvest_months: [8, 9]
    note: "Zero ristagno idrico; eccellente conservabilità naturale."

  genepy_vda:
    region: "Valle d'Aosta"
    crop: "medicinal_herbs"
    crop_display: "Genepy (Artemisia alpina)"
    zona: "Alpeggi d'alta quota (>1500m)"
    suolo_tessitura: "Povero / Roccioso / Siliceo"
    max_yield: 1.5            # t/ha di biomassa secca
    temp_range: [-25, 25]
    ideal_ph: [5.5, 7.0]
    harvest_months: [7, 8]    # Raccolta estiva in quota
    note: "Coltura per liquori premium; richiede esposizione solare massima."

  # --- PIEMONTE: L'ECCELLENZA TERRITORIALE ---

  # --- PUGLIA E BASILICATA: IL GRANAIO E L'OLIVETO D'ITALIA ---

  ulivo_coratina_bari:
    region: "Puglia"
    crop: "olive"
    crop_display: "Olivo Coratina (Terra di Bari)"
    zona: "Nord Barese (Andria / Corato / Bitonto)"
    suolo_tessitura: "Calcareo / Roccioso (Terre Rosse)"
    max_yield: 10.0           # Rese elevate in anni di carica
    temp_range: [-5, 45]      # Alta tolleranza al calore estivo
    ideal_ph: [7.5, 8.5]      # Terreni molto basici
    harvest_months: [11, 12, 1]
    note: "Varietà ricchissima di polifenoli; esige suoli ben drenati."

  grano_duro_tavoliere_foggia:
    region: "Puglia"
    crop: "durum_wheat"
    crop_display: "Grano Duro del Tavoliere"
    zona: "Provincia di Foggia (Tavoliere delle Puglie)"
    suolo_tessitura: "Argillo-limoso profondo"
    max_yield: 6.5            # Potenziale elevato per il Sud
    temp_range: [-5, 45]
    ideal_ph: [7.5, 8.5]
    harvest_months: [5, 6]    # Mietitura precoce (Giugno!)
    note: "Il 'Granaio d'Italia'; fondamentale la resistenza allo stress termico di maggio."

  vite_primitivo_manduria:
    region: "Puglia"
    crop: "wine_grape_doc"
    crop_display: "Primitivo di Manduria"
    zona: "Manduria / Sava / Maruggio (TA/BR)"
    suolo_tessitura: "Terra Rossa su roccia calcarea"
    max_yield: 9.0            # Disciplinare DOCG per l'Alberello
    temp_range: [0, 45]
    ideal_ph: [7.0, 8.2]
    harvest_months: [8, 9]    # Vendemmia anticipata (Agosto!)
    note: "Allevamento ad alberello; accumula zuccheri molto velocemente."

  uva_mensa_puglia:
    region: "Puglia"
    crop: "table_grape"
    crop_display: "Uva da Mensa (Italia/Vittoria)"
    zona: "Sud Barese / Arco Ionico"
    suolo_tessitura: "Medio impasto / Sabbioso"
    max_yield: 35.0           # Coltura molto produttiva sotto tendone
    temp_range: [5, 42]
    ideal_ph: [6.5, 7.8]
    harvest_months: [7, 8, 9, 10, 11] # Stagione lunga con diverse varietà
    note: "Richiede irrigazione massiccia; protetta da teli plastici."

  carciofo_brindisino_igp:
    region: "Puglia"
    crop: "artichoke"
    crop_display: "Carciofo Brindisino IGP"
    zona: "Litorale Brindisino / Mesagne"
    suolo_tessitura: "Sabbioso-limoso (Franco)"
    max_yield: 12.0
    temp_range: [2, 32]       # Teme le gelate che anneriscono i capolini
    ideal_ph: [6.8, 8.0]
    harvest_months: [11, 12, 1, 2, 3, 4] # Produzione invernale
    salinity_tolerance: 3.5   # Elevata tolleranza in zone costiere
    note: "Varietà precoce; raccolta manuale scalare."

  vite_aglianico_vulture:
    region: "Basilicata"
    crop: "wine_grape_docg"
    crop_display: "Aglianico del Vulture"
    zona: "Rionero / Barile / Venosa"
    suolo_tessitura: "Vulcanico (Tufo e Ceneri)"
    max_yield: 10.0
    temp_range: [-8, 38]
    ideal_ph: [6.0, 7.2]      # Suoli vulcanici neutro-acidi
    harvest_months: [10, 11]  # Vendemmia tardiva di montagna
    note: "Viticoltura su vulcano spento; clima continentale del Sud."

  # --- CALABRIA: LA TERRA DEGLI AGRUMI E DEL SOLE ---

  bergamotto_reggio_calabria:
    region: "Calabria"
    crop: "citrus"
    crop_display: "Bergamotto di Reggio Calabria"
    zona: "Fascia Costiera Reggina (Villa S.G. a Monasterace)"
    suolo_tessitura: "Alluvionale / Medio impasto"
    max_yield: 25.0           # t/ha
    temp_range: [5, 42]       # Estremamente sensibile al gelo; clima mite tutto l'anno
    ideal_ph: [6.5, 7.8]
    harvest_months: [11, 12, 1, 2, 3]
    note: "Unico al mondo; microclima irripetibile con venti caldi africani."

  cipolla_rossa_tropea_igp:
    region: "Calabria"
    crop: "vegetables"
    crop_display: "Cipolla Rossa di Tropea IGP"
    zona: "Costa Tirrenica (Amantea / Nicotera)"
    suolo_tessitura: "Sabbioso (Litorale)"
    max_yield: 30.0
    temp_range: [8, 35]
    ideal_ph: [6.0, 7.5]
    harvest_months: [4, 5, 6, 7]
    salinity_tolerance: 3.0   # Coltivata a ridosso del mare
    note: "Sapore dolce legato ai terreni sabbiosi litoranei."

  clementine_calabria_igp:
    region: "Calabria"
    crop: "citrus"
    crop_display: "Clementine di Calabria IGP"
    zona: "Piana di Sibari / Piana di Gioia Tauro"
    suolo_tessitura: "Medio impasto / Profondo"
    max_yield: 22.0
    temp_range: [2, 40]
    ideal_ph: [6.5, 7.5]
    harvest_months: [10, 11, 12, 1, 2]
    note: "Primo polo produttivo italiano; sensibile a stress idrico estivo."

  ulivo_calabria_igp:
    region: "Calabria"
    crop: "olive"
    crop_display: "Olivo Calabria IGP (Carolea)"
    zona: "Tutto il territorio regionale"
    suolo_tessitura: "Argilloso-limoso / Scheletro"
    max_yield: 8.0
    temp_range: [-5, 45]
    ideal_ph: [6.8, 8.2]
    harvest_months: [10, 11, 12]
    note: "Cultivar Carolea dominante; oli equilibrati con sentori di carciofo."

  cedro_riviera_dei_cedri:
    region: "Calabria"
    crop: "citrus"
    crop_display: "Cedro della Riviera dei Cedri"
    zona: "Alto Tirreno Cosentino (Santa Maria del Cedro)"
    suolo_tessitura: "Sciolto / Alluvionale"
    max_yield: 20.0
    temp_range: [5, 38]
    ideal_ph: [6.0, 7.2]
    harvest_months: [10, 11, 12]
    note: "Varietà Liscio Diamante; sacro per la cultura ebraica."

  # --- SICILIA: L'ISOLA DELLE MERAVIGLIE ---

  vite_etna_doc:
    region: "Sicilia"
    crop: "wine_grape_doc"
    crop_display: "Vite dell'Etna (Vulcanico)"
    zona: "Pendici dell'Etna (Catania) - Fino a 1000m slm"
    suolo_tessitura: "Sabbioso vulcanico (Ceneri e Lapilli)"
    max_yield: 9.0
    temp_range: [-5, 38]
    ideal_ph: [5.5, 7.0]      # Terreni vulcanici acidi, unici nel Sud basico
    harvest_months: [9, 10]
    note: "Viticoltura eroica su sabbie nere; pH acido e mineralità estrema."

  pomodoro_pachino_igp:
    region: "Sicilia"
    crop: "tomato"
    crop_display: "Pomodoro di Pachino IGP"
    zona: "Pachino / Portopalo / Noto (SR)"
    suolo_tessitura: "Sabbioso costiero"
    max_yield: 80.0
    temp_range: [10, 45]
    ideal_ph: [6.5, 8.0]
    harvest_months: [4, 5, 6, 7, 8, 9, 10, 11] # Ciclo lunghissimo
    salinity_tolerance: 5.0   # Altissima tolleranza (necessaria per il gusto)
    note: "Acque d'irrigazione salmastre; il sale è la chiave del sapore."

  arancia_rossa_sicilia_igp:
    region: "Sicilia"
    crop: "citrus"
    crop_display: "Arancia Rossa di Sicilia IGP"
    zona: "Piana di Catania / Enna / Siracusa"
    suolo_tessitura: "Alluvionale / Vulcanico"
    max_yield: 30.0
    temp_range: [2, 42]
    ideal_ph: [6.5, 7.8]
    harvest_months: [12, 1, 2, 3, 4]
    note: "Pigmentazione legata all'escursione termica notturna dell'Etna."

  pistacchio_bronte_dop:
    region: "Sicilia"
    crop: "pistachio"
    crop_display: "Pistacchio di Bronte DOP"
    zona: "Bronte / Adrano / Biancavilla"
    suolo_tessitura: "Roccia Lavica / Sciolto"
    max_yield: 3.5            # t/ha (in guscio, solo anni dispari)
    temp_range: [-8, 42]
    ideal_ph: [5.5, 7.2]
    harvest_months: [8, 9]
    note: "Raccolta biennale (anni dispari); cresce su lave fessurate."

  grano_duro_antico_sicilia:
    region: "Sicilia"
    crop: "durum_wheat"
    crop_display: "Grani Antichi (Tumminia/Russello)"
    zona: "Entroterra Siciliano (Enna / Caltanissetta)"
    suolo_tessitura: "Argilloso (Vertisuoli)"
    max_yield: 2.5            # Rese basse per conservare biodiversità
    temp_range: [-5, 48]      # Massima tolleranza al calore
    ideal_ph: [7.5, 8.5]
    harvest_months: [5, 6]
    note: "Tumminia è a ciclo breve (marzuolo); Russello a paglia alta."

  # --- SARDEGNA: TERRA DI VENTO E GRANITO ---

  grano_emiliano:
    region: "Emilia-Romagna"
    crop: "soft_wheat"
    crop_display: "Grano Tenero Emiliano"
    zona: "Emilia-Romagna (Pianura Padana)"
    suolo_tessitura: "Limoso / Alluvionale"
    max_yield: 10.0
    temp_range: [-15, 35]
    harvest_months: [6, 7]
    ideal_ph: [6.0, 7.5]
    note: "Grano tenero per panificazione, suoli fertili e freschi."

  # --- PIEMONTE: L'ECCELLENZA TERRITORIALE ---

  vite_nebbiolo_barolo:
    region: "Piemonte"
    crop: "wine_grape_docg"
    crop_display: "Nebbiolo da Barolo (Langhe)"
    zona: "Langhe (Barolo, La Morra, Serralunga)"
    suolo_tessitura: "Argillo-limoso calcareo (Marne di Sant'Agata)"
    max_yield: 8.0            # Disciplinare Barolo DOCG (t/ha)
    temp_range: [-15, 38]
    ideal_ph: [7.2, 8.2]      # Terreni basici/calcarei
    harvest_months: [10]      # Ottobre
    note: "Focus su longevità e struttura; terreni basici."

  vite_nebbiolo_alto_piemonte:
    region: "Piemonte"
    crop: "wine_grape_docg"
    crop_display: "Nebbiolo Alto Piemonte (Gattinara/Ghemme)"
    zona: "Alto Piemonte (Vercellese/Novarese)"
    suolo_tessitura: "Sabbioso-ghiaioso vulcanico"
    max_yield: 9.0            # Disciplinare Gattinara/Ghemme
    temp_range: [-18, 35]
    ideal_ph: [4.5, 6.0]      # Terreni acidi vulcanici (opposto del Barolo!)
    harvest_months: [9, 10]
    note: "Vini minerali; terreni acidi unici in Piemonte."

  riso_novarese:
    region: "Piemonte"
    crop: "rice"
    crop_display: "Riso Novarese (Carnaroli/Arborio)"
    zona: "Novarese (Bassa Novarese)"
    suolo_tessitura: "Sabbioso-limoso (Terrazzi fluvioglaciali)"
    max_yield: 7.5
    temp_range: [5, 36]
    ideal_ph: [5.0, 6.5]
    harvest_months: [9, 10]
    salinity_tolerance: 1.5
    note: "Terreni più leggeri; acque di risorgiva."

  riso_vercellese:
    region: "Piemonte"
    crop: "rice"
    crop_display: "Riso Vercellese"
    zona: "Vercellese (Piana alluvionale)"
    suolo_tessitura: "Argillo-limoso (Terre forti)"
    max_yield: 8.5
    temp_range: [8, 38]
    ideal_ph: [5.5, 7.0]
    harvest_months: [9, 10]
    salinity_tolerance: 1.2
    note: "Suoli pesanti; gestione storica Canale Cavour."

  nocciola_piemonte_alta_langa:
    region: "Piemonte"
    crop: "hazelnut"
    crop_display: "Nocciola Tonda Gentile (Alta Langa)"
    zona: "Alta Langa (>500m slm)"
    suolo_tessitura: "Sciolto / Scheletro prevalente"
    max_yield: 2.8
    temp_range: [-18, 34]
    ideal_ph: [6.0, 7.5]
    harvest_months: [8, 9]
    note: "Focus qualità del seme; terreni poveri."

  mais_cuneese_irriguo:
    region: "Piemonte"
    crop: "maize"
    crop_display: "Mais da granella (Pianura Cuneese)"
    zona: "Cuneo / Savigliano / Fossano"
    suolo_tessitura: "Franco-limoso alluvionale (Profondo)"
    max_yield: 16.0
    temp_range: [5, 40]
    ideal_ph: [6.0, 7.2]
    harvest_months: [9, 10, 11]
    note: "Alta produttività; irrigazione critica a Luglio."

  mela_cuneese:
    region: "Piemonte"
    crop: "apple"
    crop_display: "Mela Rossa Cuneo IGP"
    zona: "Saluzzese / Pinerolese"
    suolo_tessitura: "Franco-sabbioso (Ben drenato)"
    max_yield: 55.0
    temp_range: [-15, 32]
    ideal_ph: [6.0, 7.0]
    harvest_months: [9, 10]
    note: "Necessaria escursione termica per colorazione."

  # --- LOMBARDIA: LA FABBRICA DEL CIBO ---

  mais_intensivo_padano:
    region: "Lombardia"
    crop: "maize"
    crop_display: "Mais da granella (Cremona/Mantova/Brescia)"
    zona: "Bassa Padana Irrigua"
    suolo_tessitura: "Franco-argilloso (Profondo e fertile)"
    max_yield: 20.0           # Rese record mondiali per l'insilato e granella
    temp_range: [5, 42]
    ideal_ph: [6.5, 7.5]      # Terreni neutri
    harvest_months: [9, 10]
    note: "Alimentazione filiere DOP (Grana Padano); irrigazione a scorrimento."

  riso_lomellino:
    region: "Lombardia"
    crop: "rice"
    crop_display: "Riso della Lomellina (Pavia)"
    zona: "Pavia (Lomellina)"
    suolo_tessitura: "Sabbioso-limoso (Terrazzi alluvionali)"
    max_yield: 7.5
    temp_range: [5, 37]
    ideal_ph: [5.5, 7.0]
    harvest_months: [9, 10]
    note: "Suoli più sciolti del Vercellese; focus su varietà Carnaroli."

  vite_franciacorta_docg:
    region: "Lombardia"
    crop: "wine_grape_docg"
    crop_display: "Vite Metodo Classico (Franciacorta)"
    zona: "Erbusco / Corte Franca / Iseo"
    suolo_tessitura: "Morenico (Ghiaioso-sabbioso)"
    max_yield: 12.0           # Limite disciplinare per basi spumante
    temp_range: [-12, 38]
    ideal_ph: [6.5, 7.8]
    harvest_months: [8, 9]    # Vendemmia precoce (Agosto!)
    note: "Vendemmia anticipata per preservare l'acidità (basi spumante)."

  mela_valtellina_igp:
    region: "Lombardia"
    crop: "apple"
    crop_display: "Mela della Valtellina IGP"
    zona: "Valtellina (Sondrio)"
    suolo_tessitura: "Franco-sabbioso (Alveo fluviale)"
    max_yield: 65.0
    temp_range: [-20, 32]
    ideal_ph: [5.5, 6.8]      # Terreni leggermente acidi
    harvest_months: [9, 10, 11]
    note: "Forte escursione termica alpina; terreni leggeri e drenanti."

